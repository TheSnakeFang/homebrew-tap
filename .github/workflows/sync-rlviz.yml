name: sync rlviz

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-rlviz
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Fetch the latest released formula
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors \
            https://github.com/unlatch-ai/rlviz/releases/latest/download/rlviz.rb \
            --output /tmp/rlviz.rb
          ruby -c /tmp/rlviz.rb
          grep -Fq 'homepage "https://github.com/unlatch-ai/rlviz"' /tmp/rlviz.rb
          grep -Fq 'https://github.com/unlatch-ai/rlviz/releases/download/' /tmp/rlviz.rb
          mkdir -p Formula
          if ! cmp -s /tmp/rlviz.rb Formula/rlviz.rb; then
            mv /tmp/rlviz.rb Formula/rlviz.rb
          fi
      - name: Commit an updated formula
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- Formula/rlviz.rb)" ]; then
            echo "RLViz formula is current"
            exit 0
          fi
          version=$(ruby -ne 'puts $1 if $_ =~ /^  version "([^"]+)"/' Formula/rlviz.rb)
          test -n "${version}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/rlviz.rb
          git commit -m "rlviz ${version}"
          git push origin HEAD:main
